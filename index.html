<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Running Trainer</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">

    <!-- HEADER -->
    <header class="header">
      <h1>Running <span>Trainer</span></h1>
      <span style="font-size:0.75rem;color:var(--text-dim);">C25K · Hal Higdon</span>
    </header>

    <!-- PROGRAM / WEEK / DAY SELECTOR -->
    <div class="card">
      <div class="section-title">운동 선택</div>

      <!-- Program -->
      <div class="selector-group" style="margin-bottom:10px;">
        <label for="sel-program">프로그램</label>
        <select id="sel-program"></select>
      </div>

      <!-- Week + Day -->
      <div class="selector-row">
        <div class="selector-group">
          <label for="sel-week">주차</label>
          <select id="sel-week"></select>
        </div>
        <div class="selector-group">
          <label for="sel-day">운동일</label>
          <select id="sel-day"></select>
        </div>
      </div>

      <!-- Schedule summary -->
      <div style="margin-top:14px;">
        <div class="summary-label">오늘의 스케줄</div>
        <div class="summary-chips" id="summary-chips"></div>
      </div>
    </div>

    <!-- YOUTUBE -->
    <div class="card">
      <div class="section-title">YouTube 음악 (선택)</div>
      <div class="yt-input-row">
        <input
          id="yt-url"
          type="url"
          placeholder="YouTube URL 붙여넣기"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
          inputmode="url"
        />
        <button class="btn-load" id="btn-load">불러오기</button>
      </div>
      <div id="yt-container" style="margin-top:12px;">
        <div class="yt-player-wrap">
          <div class="yt-placeholder">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="12" cy="12" r="10"/>
              <polygon points="10,8 16,12 10,16" fill="currentColor" stroke="none"/>
            </svg>
            <span>URL 없이도 음성 가이드만 사용 가능</span>
          </div>
        </div>
      </div>
    </div>

    <!-- STATUS DISPLAY -->
    <div class="card status-card idle" id="status-card">
      <div class="status-icon" id="status-icon">🏃</div>
      <div class="status-label idle" id="status-label">준비</div>
      <div class="timer-display" id="timer-display">00:00</div>

      <div class="interval-progress">
        <div class="interval-progress-bar" id="iv-progress-bar" style="width:0%;background:var(--accent);"></div>
      </div>

      <div class="next-label" id="next-label">시작 버튼을 눌러주세요</div>
    </div>

    <!-- OVERALL PROGRESS -->
    <div class="card">
      <div class="section-title">전체 진행</div>
      <div class="progress-meta" id="progress-meta">
        <strong>00:00</strong> / 00:00
      </div>
      <div class="overall-progress">
        <div class="overall-progress-bar" id="overall-bar" style="width:0%;"></div>
      </div>
      <div class="timeline" id="timeline"></div>
    </div>

    <!-- CONTROLS -->
    <div class="controls">
      <button class="btn btn-primary" id="btn-start-pause">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5,3 19,12 5,21"/>
        </svg>
        시작
      </button>
      <button class="btn btn-reset" id="btn-reset" title="초기화">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
          <path d="M3 3v5h5"/>
        </svg>
      </button>
    </div>

    <!-- AUDIO SETTINGS -->
    <div class="card audio-section">
      <div class="section-title">음성 설정</div>
      <div class="audio-toggle-row">
        <span class="toggle-label">음성 큐 켜기</span>
        <label class="toggle">
          <input type="checkbox" id="toggle-cue" checked />
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="audio-row" style="margin-top:10px;">
        <span style="font-size:0.85rem;color:var(--text-dim);">🔈</span>
        <input type="range" id="vol-slider" min="0" max="100" value="90" />
        <span style="font-size:0.85rem;color:var(--text-dim);">🔊</span>
      </div>
      <p style="font-size:0.75rem;color:var(--text-dim);margin-top:10px;line-height:1.5;">
        📱 iOS: 시작 버튼을 누르면 음성이 활성화돼요. 무음 모드를 해제해주세요.
      </p>
    </div>

    <div class="bottom-spacer"></div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="js/schedule.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
