services:
  - type: web
    name: c25k-trainer-api
    env: python
    region: singapore  # 한국에서 가장 가까운 리전
    plan: free
    buildCommand: |
      apt-get update && apt-get install -y ffmpeg
      pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --timeout 300 --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
